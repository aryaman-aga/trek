name: Background Scraper Worker

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Script to run'
        required: true
        default: 'scrape_competition_matrix.py'
      brands:
        description: 'Space-separated list of brands to scrape'
        required: true
      convert_to_inr:
        description: 'Convert to INR (true/false)'
        required: false
        default: 'true'

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run Scraper
        run: |
          INR_FLAG=""
          if [ "${{ github.event.inputs.convert_to_inr }}" = "true" ]; then
            INR_FLAG="--inr"
          fi
          
          echo "Running: python ${{ github.event.inputs.script }} ${{ github.event.inputs.brands }} $INR_FLAG --out result.xlsx"
          python ${{ github.event.inputs.script }} ${{ github.event.inputs.brands }} $INR_FLAG --out result.xlsx

      - name: Upload Excel Output
        uses: actions/upload-artifact@v4
        with:
          name: Scrape_Result_${{ github.run_id }}
          path: result.xlsx
          retention-days: 7